<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="566" viewBox="0 0 1000 566" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <style>
      .txt { fill: #d6dde6; } .dim { fill: #8590a0; } .faint { fill: #5a6475; }
      .amber { fill: #ffb454; } .pass { fill: #3fb950; } .fail { fill: #f85149; }
      .v1 { fill: #e0a34a; } .v2 { fill: #4aa3ff; }
      .kw { fill: #ff9d6b; } .bi { fill: #5cc8ff; } .str { fill: #a9e46a; } .num { fill: #ffb454; } .fn { fill: #d7a3ff; }
      .lbl { fill: #5a6475; letter-spacing: 2px; }
    </style>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 H0 V48" fill="none" stroke="#141a23" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1000" height="566" fill="#0a0c10"/>
  <rect width="1000" height="566" fill="url(#grid)"/>
  <rect width="1000" height="2" fill="#ffb454"/>
  <rect x="0" y="2" width="640" height="2" fill="#ffb454" opacity="0.25"/>

  <!-- header -->
  <text x="28" y="42" font-size="20" font-weight="700" class="txt">docs<tspan class="amber">·</tspan>that<tspan class="amber">·</tspan>run</text>
  <text x="212" y="42" font-size="11" class="faint">v0.3 · execution-graded rag</text>
  <!-- status readouts -->
  <g font-size="11">
    <rect x="690" y="26" width="122" height="22" fill="#0d121a" stroke="#1c232e"/>
    <circle cx="704" cy="37" r="3.5" class="amber"/>
    <text x="714" y="41" class="dim">CLIENT: <tspan class="txt" font-weight="700">MOCK</tspan></text>
    <rect x="820" y="26" width="152" height="22" fill="#0d121a" stroke="#1c232e"/>
    <circle cx="834" cy="37" r="3.5" class="pass"/>
    <text x="844" y="41" class="dim">SANDBOX: <tspan class="txt" font-weight="700">v1·v2 READY</tspan></text>
  </g>
  <line x1="28" y1="60" x2="972" y2="60" stroke="#1c232e"/>

  <!-- query line -->
  <text x="28" y="92" font-size="12" class="lbl">QUERY</text>
  <text x="28" y="118" font-size="14"><tspan class="amber" font-weight="700">&gt; </tspan><tspan class="txt">In Pydantic v2, how do I serialize a model instance to a dictionary?</tspan><tspan class="dim">  ·  DIFF</tspan></text>

  <!-- version-lock note -->
  <rect x="28" y="134" width="944" height="46" fill="#10161f" stroke="#1c232e"/>
  <rect x="28" y="134" width="2" height="46" class="amber"/>
  <text x="46" y="156" font-size="12" class="dim">Same query, both versions. Because v2 removed several v1 names outright, <tspan class="amber">the execution check is the version-correctness</tspan></text>
  <text x="46" y="172" font-size="12" class="dim"><tspan class="amber">check</tspan> — a snippet that used <tspan class="txt">model_dump()</tspan> passes on v2 but fails the v1 sandbox, where that method does not exist.</text>

  <!-- ===== v1 panel (FAIL) ===== -->
  <g transform="translate(28,196)">
    <rect width="462" height="344" fill="#0d121a" stroke="#1c232e"/>
    <rect width="462" height="30" fill="#10161f"/>
    <line x1="0" y1="30" x2="462" y2="30" stroke="#1c232e"/>
    <text x="16" y="20" font-size="11" class="lbl">PYDANTIC</text>
    <rect x="92" y="8" width="24" height="16" fill="none" stroke="#e0a34a" stroke-opacity="0.5"/>
    <text x="98" y="20" font-size="10" font-weight="700" class="v1">v1</text>

    <!-- verdict instrument -->
    <g transform="translate(16,46)">
      <rect width="430" height="72" fill="#1e1210" stroke="#4a231f"/>
      <line x1="104" y1="0" x2="104" y2="72" stroke="#4a231f"/>
      <text x="52" y="38" font-size="26" font-weight="700" class="fail" text-anchor="middle">✕</text>
      <text x="52" y="58" font-size="12" font-weight="700" class="fail" text-anchor="middle" letter-spacing="2">FAIL</text>
      <text x="122" y="32" font-size="12" class="dim">target  <tspan class="txt">pydantic v1 sandbox</tspan></text>
      <text x="122" y="52" font-size="12" class="dim">exit    <tspan class="txt">1</tspan></text>
    </g>

    <!-- code -->
    <rect x="16" y="130" width="430" height="130" fill="#070a0e" stroke="#1c232e"/>
    <g font-size="12">
      <text x="30" y="150"><tspan class="kw">from</tspan><tspan class="txt"> pydantic </tspan><tspan class="kw">import</tspan><tspan class="txt"> BaseModel</tspan></text>
      <text x="30" y="172"><tspan class="kw">class</tspan><tspan class="txt"> </tspan><tspan class="fn">User</tspan><tspan class="txt">(BaseModel):</tspan></text>
      <text x="30" y="188"><tspan class="txt">    name: </tspan><tspan class="bi">str</tspan></text>
      <text x="30" y="204"><tspan class="txt">    age: </tspan><tspan class="bi">int</tspan></text>
      <text x="30" y="226"><tspan class="txt">u = </tspan><tspan class="fn">User</tspan><tspan class="txt">(name=</tspan><tspan class="str">'Ada'</tspan><tspan class="txt">, age=</tspan><tspan class="num">36</tspan><tspan class="txt">)</tspan></text>
      <text x="30" y="242"><tspan class="kw">assert</tspan><tspan class="txt"> u.model_dump() == {...}</tspan></text>
    </g>

    <!-- stderr -->
    <text x="16" y="284" font-size="11" class="lbl">STDERR</text>
    <rect x="16" y="292" width="430" height="38" fill="#150c0b" stroke="#4a231f"/>
    <text x="28" y="316" font-size="11" fill="#f0a9a4">AttributeError: 'User' object has no attribute 'model_dump'</text>
  </g>

  <!-- ===== v2 panel (PASS) ===== -->
  <g transform="translate(510,196)">
    <rect width="462" height="344" fill="#0d121a" stroke="#1c232e"/>
    <rect width="462" height="30" fill="#10161f"/>
    <line x1="0" y1="30" x2="462" y2="30" stroke="#1c232e"/>
    <text x="16" y="20" font-size="11" class="lbl">PYDANTIC</text>
    <rect x="92" y="8" width="24" height="16" fill="none" stroke="#4aa3ff" stroke-opacity="0.5"/>
    <text x="98" y="20" font-size="10" font-weight="700" class="v2">v2</text>

    <!-- verdict instrument -->
    <g transform="translate(16,46)">
      <rect width="430" height="72" fill="#0c1c12" stroke="#1c4128"/>
      <line x1="104" y1="0" x2="104" y2="72" stroke="#1c4128"/>
      <text x="52" y="38" font-size="26" font-weight="700" class="pass" text-anchor="middle">✓</text>
      <text x="52" y="58" font-size="12" font-weight="700" class="pass" text-anchor="middle" letter-spacing="2">PASS</text>
      <text x="122" y="32" font-size="12" class="dim">target  <tspan class="txt">pydantic v2 sandbox</tspan></text>
      <text x="122" y="52" font-size="12" class="dim">exit    <tspan class="txt">0</tspan></text>
    </g>

    <!-- code -->
    <rect x="16" y="130" width="430" height="130" fill="#070a0e" stroke="#1c232e"/>
    <g font-size="12">
      <text x="30" y="150"><tspan class="kw">from</tspan><tspan class="txt"> pydantic </tspan><tspan class="kw">import</tspan><tspan class="txt"> BaseModel</tspan></text>
      <text x="30" y="172"><tspan class="kw">class</tspan><tspan class="txt"> </tspan><tspan class="fn">User</tspan><tspan class="txt">(BaseModel):</tspan></text>
      <text x="30" y="188"><tspan class="txt">    name: </tspan><tspan class="bi">str</tspan></text>
      <text x="30" y="204"><tspan class="txt">    age: </tspan><tspan class="bi">int</tspan></text>
      <text x="30" y="226"><tspan class="txt">u = </tspan><tspan class="fn">User</tspan><tspan class="txt">(name=</tspan><tspan class="str">'Ada'</tspan><tspan class="txt">, age=</tspan><tspan class="num">36</tspan><tspan class="txt">)</tspan></text>
      <text x="30" y="242"><tspan class="kw">assert</tspan><tspan class="txt"> u.model_dump() == {...}</tspan></text>
    </g>

    <!-- cited + retrieval -->
    <text x="16" y="284" font-size="11" class="lbl">CITED</text>
    <rect x="66" y="273" width="84" height="16" fill="none" stroke="#ffb454" stroke-opacity="0.35"/>
    <text x="74" y="285" font-size="11" class="amber">c_v2_dump</text>
    <text x="16" y="314" font-size="11" class="dim">● c_v2_dump   score 0.0328   bm25#1 · dense#1</text>
  </g>
</svg>
